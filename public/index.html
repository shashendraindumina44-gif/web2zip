<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2Zip | Cyber Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d12;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'JetBrains Mono', monospace;
            color: #00ff88;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto; 
            padding: 20px;
        }

        .anime-border {
            border: 2px solid #00ff88;
            box-shadow: 5px 5px 0px #7000ff;
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 0% 100%);
        }

        .tech-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #7000ff;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .tech-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .btn-execute {
            background: #00ff88;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-execute:hover {
            background: #7000ff;
            color: #fff;
            box-shadow: 0 0 20px #7000ff;
        }

        .status-box {
            border-left: 3px solid #7000ff;
            background: rgba(112, 0, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="anime-border bg-[#16161e] w-full max-w-lg p-8 relative">
        <div class="absolute top-2 right-4 text-[10px] opacity-50">VER 3.0.2 // STEALTH_HYBRID</div>
        
        <div class="mb-8">
            <h1 class="text-4xl font-black glitch-text tracking-tighter">
                SCRAPE <span class="text-[#7000ff]">PROTOCOL</span>
            </h1>
            <div class="h-1 w-20 bg-[#7000ff] mt-1"></div>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] mb-2 text-purple-400 font-bold tracking-widest">INPUT_TARGET_URL</p>
                <input type="text" id="urlInput" 
                    class="tech-input w-full p-4 rounded-sm font-bold italic"
                    placeholder="HTTP://SOURCE_LINK.COM" value="https://">
            </div>

            <div class="flex items-center justify-between p-4 bg-black/40 border border-purple-900/30 rounded">
                <div>
                    <p class="text-[11px] font-bold text-white">ADVANCED_STEALTH_MODE</p>
                    <p class="text-[9px] text-gray-500 italic">Uses Dual-Proxy + User Rendering to bypass 403 blocks.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="advancedMode" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#7000ff] shadow-[0_0_10px_rgba(112,0,255,0.4)]"></div>
                </label>
            </div>

            <button onclick="runScraper()" id="runBtn" class="btn-execute w-full p-5 italic">
                Execute Extraction
            </button>
        </div>

        <div id="sysLog" class="mt-8 status-box p-4 hidden">
            <div class="text-[11px] space-y-1" id="logContent">
                <p>> Initializing Scraper...</p>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-800 flex justify-between items-end">
            <div>
                <p class="text-[9px] text-gray-500 uppercase">Tech Authority</p>
                <p class="text-xs font-bold text-white tracking-widest">LORD INDUMINA</p>
            </div>
            <div class="text-[10px] bg-[#7000ff] text-white px-2 py-1">SECURE ACCESS</div>
        </div>
    </div>

    <iframe id="renderFrame" style="display:none;"></iframe>

    <script>
        const log = (msg, color = "#00ff88") => {
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = `> ${msg}`;
            const container = document.getElementById('logContent');
            container.appendChild(p);
            container.scrollTop = container.scrollHeight;
        };

        async function runScraper() {
            const url = document.getElementById('urlInput').value;
            const isAdvanced = document.getElementById('advancedMode').checked;
            if (!url || url === 'https://') return alert('ERROR: URL_REQUIRED');

            document.getElementById('sysLog').classList.remove('hidden');
            document.getElementById('logContent').innerHTML = "";
            log("Initializing Protocol...");
            
            const btn = document.getElementById('runBtn');
            btn.innerText = "RUNNING...";
            btn.disabled = true;

            if (isAdvanced) {
                await executeUserSideExtraction(url);
                btn.innerText = "Execute Extraction";
                btn.disabled = false;
            } else {
                log("Executing Server-Side Scrape...");
                window.location.href = `/api/convert?url=${encodeURIComponent(url)}`;
                setTimeout(() => {
                    btn.innerText = "Execute Extraction";
                    btn.disabled = false;
                }, 5000);
            }
        }

        async function smartFetch(url) {
            // Priority 1: Our Stealth Proxy
            try {
                const res = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`);
                if (res.status === 200) return res;
            } catch (e) {}

            // Priority 2: Public CORS Proxy (Fallback for 403)
            log("Server Blocked. Engaging Secondary Bypass...", "#7000ff");
            const publicProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            return await fetch(publicProxy);
        }

        async function executeUserSideExtraction(targetUrl) {
            try {
                log("Engaging Stealth Rendering Engine...", "#7000ff");
                const zip = new JSZip();
                
                log("Bypassing Web Shields...");
                const response = await smartFetch(targetUrl);
                if (!response.ok) throw new Error(`Access Denied (403/404)`);
                const html = await response.text();

                log("Injecting Render Chamber...");
                const frame = document.getElementById('renderFrame');
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                frameDoc.open();
                frameDoc.write(html);
                frameDoc.close();

                log("Executing Site JS (8s Wait)...");
                await new Promise(r => setTimeout(r, 8000));

                log("Capturing Hydrated State...");
                const renderedDoc = frameDoc.cloneNode(true);
                const assets = [];
                
                const process = (selector, attr, folder) => {
                    renderedDoc.querySelectorAll(selector).forEach((el, i) => {
                        const src = el.getAttribute(attr);
                        if (src && !src.startsWith('data:') && !src.startsWith('#')) {
                            try {
                                const absUrl = new URL(src, targetUrl).href;
                                const fileName = `file-${i}.${folder}`;
                                assets.push({ url: absUrl, path: `${folder}/${fileName}` });
                                el.setAttribute(attr, `./${folder}/${fileName}`);
                            } catch (e) {}
                        }
                    });
                };

                process('link[rel="stylesheet"]', 'href', 'css');
                process('script[src]', 'src', 'js');
                process('img', 'src', 'img');

                zip.file("index.html", renderedDoc.documentElement.outerHTML);

                log(`Downloading Assets (${assets.length})...`);
                for (const asset of assets) {
                    try {
                        const res = await smartFetch(asset.url);
                        if (res.ok) {
                            const blob = await res.blob();
                            zip.file(asset.path, blob);
                        }
                    } catch (e) {}
                }

                log("Packaging ZIP...");
                const content = await zip.generateAsync({ type: "blob" });
                const zipName = new URL(targetUrl).hostname.replace(/\./g, '_') + "_stealth.zip";
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                link.click();

                log("COMPLETE!", "#00ff88");
            } catch (err) {
                log(`FAILED: ${err.message}`, "red");
            }
        }
    </script>
</body>
</html>
